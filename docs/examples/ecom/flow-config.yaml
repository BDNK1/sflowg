name: ecommerce-api
version: "1.0.0"

runtime:
  port: 8080
  engine: dsl

observability:
  logging:
    level: info
    format: json
    export:
      enabled: true
      mode: [stdout, otlp]
      endpoint: localhost:4317
      insecure: true
      attributes:
        service.name: ecommerce-api
        deployment.environment: local
  tracing:
    enabled: true
    endpoint: localhost:4317
    insecure: true
    sampler: parent_based
    sample_rate: 1.0
    attributes:
      service.name: ecommerce-api
      deployment.environment: local
  metrics:
    enabled: true
    endpoint: localhost:4317
    insecure: true
    export_interval_ms: 10000
    attributes:
      service.name: ecommerce-api
      deployment.environment: local
    user:
      declarations:
        payment_attempts:
          type: counter
          description: "Payment attempts by provider and outcome"
          labels:
            provider:
              type: enum
              values: [stripe]
            outcome:
              type: enum
              values: [success, error, queued]

properties:
  app_name: "Ecommerce API"
  stripe_integration_url: ${STRIPE_INTEGRATION_URL:http://localhost:8090}

plugins:
  - source: http
    config:
      timeout: ${HTTP_TIMEOUT:10s}
      debug: false

  - source: postgres
    config:
      connection_string: ${DATABASE_URL:postgres://postgres:postgres@localhost:5432/ecommerce?sslmode=disable}
      max_open_conns: 5
      max_idle_conns: 2
      conn_max_lifetime_ms: 300000
